<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nikâha Doğru</title>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,600;1,400&family=Lato:wght@300;400&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary-color: #5d4a46; /* Sıcak, zarif bir kahve/taupe */
            --accent-color: #d4af37; /* Şampanya altını */
            --glass-bg: rgba(255, 255, 255, 0.65);
            --glass-border: rgba(255, 255, 255, 0.8);
        }

        body {
            margin: 0;
            padding: 0;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            font-family: 'Lato', sans-serif;
            color: var(--primary-color);
            overflow: hidden;
            /* İnci beyazından uçuk pembeye ve uçuk maviye rüya gibi hareketli bir geçiş */
            background: linear-gradient(-45deg, #fdfbfb, #f5eef0, #e8f0f2, #f3e6e8);
            background-size: 400% 400%;
            animation: gradientBG 20s ease infinite;
        }

        @keyframes gradientBG {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }

        /* --- SİHİRLİ ATEŞ BÖCEKLERİ (Partiküller) --- */
        #particles {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            z-index: 0; pointer-events: none;
        }
        .particle {
            position: absolute;
            background: radial-gradient(circle, rgba(255,255,255,1) 0%, rgba(212,175,55,0.4) 50%, rgba(255,255,255,0) 100%);
            border-radius: 50%;
            animation: floatUp linear infinite;
        }
        @keyframes floatUp {
            0% { transform: translateY(110vh) scale(0); opacity: 0; }
            20% { opacity: 0.8; transform: translateY(80vh) scale(1); }
            80% { opacity: 0.8; }
            100% { transform: translateY(-10vh) scale(0); opacity: 0; }
        }

        /* --- ANA KART (Premium Glassmorphism) --- */
        .card {
            position: relative;
            z-index: 10;
            width: 90%;
            max-width: 500px;
            padding: 3rem 2rem;
            background: var(--glass-bg);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid var(--glass-border);
            border-radius: 30px;
            box-shadow: 0 30px 60px rgba(93, 74, 70, 0.08), 
                        inset 0 0 0 1px rgba(255, 255, 255, 0.5);
            text-align: center;
        }

        /* --- ZARİF ÇİÇEK/YÜZÜK SVG --- */
        .header-icon {
            width: 60px;
            height: 60px;
            margin: 0 auto 1.5rem auto;
            animation: gentlePulse 4s ease-in-out infinite alternate;
        }
        @keyframes gentlePulse {
            0% { transform: scale(1); opacity: 0.9; }
            100% { transform: scale(1.05); opacity: 1; filter: drop-shadow(0 0 10px rgba(212,175,55,0.3)); }
        }

        h1 {
            font-family: 'Playfair Display', serif;
            font-style: italic;
            font-size: 2.8rem;
            font-weight: 400;
            margin: 0 0 0.5rem 0;
            color: var(--primary-color);
            letter-spacing: 2px;
        }

        .divider {
            width: 50px;
            height: 2px;
            background: var(--accent-color);
            margin: 1.5rem auto;
            border-radius: 2px;
            opacity: 0.6;
        }

        /* --- GERİ SAYIM --- */
        .countdown {
            display: flex;
            justify-content: center;
            gap: 1.5rem;
            margin: 2.5rem 0;
        }

        .time-box {
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .time-value {
            font-family: 'Playfair Display', serif;
            font-size: 2.5rem;
            font-weight: 400;
            color: var(--primary-color);
            line-height: 1;
            margin-bottom: 0.5rem;
        }

        .time-label {
            font-size: 0.7rem;
            text-transform: uppercase;
            letter-spacing: 3px;
            color: #8c7b78;
            font-weight: 600;
        }

        /* --- DETAYLAR --- */
        .details {
            background: rgba(255, 255, 255, 0.5);
            padding: 1.5rem;
            border-radius: 20px;
            border: 1px solid rgba(255, 255, 255, 0.6);
        }

        .detail-row {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 0.8rem;
            margin-bottom: 1rem;
            font-size: 1.1rem;
        }
        .detail-row:last-child { margin-bottom: 0; }
        
        .detail-icon {
            width: 18px;
            height: 18px;
            fill: var(--accent-color);
        }

        .detail-text {
            font-weight: 400;
            letter-spacing: 0.5px;
        }
    </style>
</head>
<body>

    <!-- Arka Plandaki Sihirli Işıltılar -->
    <div id="particles"></div>

    <div class="card">
        <!-- Zarif İç İçe Geçmiş Yüzükler SVG -->
        <svg class="header-icon" viewBox="0 0 100 100" xmlns="http://www.w3.org/2000/svg">
            <circle cx="40" cy="50" r="25" fill="none" stroke="#d4af37" stroke-width="3" />
            <circle cx="60" cy="50" r="25" fill="none" stroke="#d4af37" stroke-width="3" />
            <!-- Yüzük taşı detayı -->
            <path d="M 55 22 L 60 15 L 65 22 L 60 27 Z" fill="#d4af37" />
        </svg>

        <h1>Nikâha Doğru</h1>
        
        <div class="divider"></div>
        
        <div class="countdown">
            <div class="time-box">
                <span class="time-value" id="days">00</span>
                <span class="time-label">Gün</span>
            </div>
            <div class="time-box">
                <span class="time-value" id="hours">00</span>
                <span class="time-label">Saat</span>
            </div>
            <div class="time-box">
                <span class="time-value" id="minutes">00</span>
                <span class="time-label">Dak</span>
            </div>
            <div class="time-box">
                <span class="time-value" id="seconds">00</span>
                <span class="time-label">San</span>
            </div>
        </div>

        <div class="details">
            <div class="detail-row">
                <svg class="detail-icon" viewBox="0 0 24 24">
                    <path d="M19 4h-1V2h-2v2H8V2H6v2H5c-1.11 0-1.99.9-1.99 2L3 20c0 1.1.89 2 2 2h14c1.1 0 2-.9 2-2V6c0-1.1-.9-2-2-2zm0 16H5V10h14v10zM9 14H7v-2h2v2zm4 0h-2v-2h2v2zm4 0h-2v-2h2v2zm-8 4H7v-2h2v2zm4 0h-2v-2h2v2zm4 0h-2v-2h2v2z"/>
                </svg>
                <span class="detail-text">18 Temmuz 2026 • 14:30</span>
            </div>
            <div class="detail-row">
                <svg class="detail-icon" viewBox="0 0 24 24">
                    <path d="M12 2C8.13 2 5 5.13 5 9c0 5.25 7 13 7 13s7-7.75 7-13c0-3.87-3.13-7-7-7zm0 9.5c-1.38 0-2.5-1.12-2.5-2.5s1.12-2.5 2.5-2.5 2.5 1.12 2.5 2.5-1.12 2.5-2.5 2.5z"/>
                </svg>
                <span class="detail-text">Isparta Öğretmenevi</span>
            </div>
        </div>
    </div>

    <script>
        // --- GERİ SAYIM ---
        const targetDate = new Date("2026-07-18T14:30:00").getTime();

        const countdownInterval = setInterval(function() {
            const now = new Date().getTime();
            const distance = targetDate - now;

            if (distance < 0) {
                clearInterval(countdownInterval);
                document.querySelector(".countdown").innerHTML = 
                    "<div style='font-size: 1.8rem; font-family: Playfair Display, serif; font-style: italic; color: #d4af37;'>O büyük gün geldi...</div>";
                return;
            }

            const days = Math.floor(distance / (1000 * 60 * 60 * 24));
            const hours = Math.floor((distance % (1000 * 60 * 60 * 24)) / (1000 * 60 * 60));
            const minutes = Math.floor((distance % (1000 * 60 * 60)) / (1000 * 60));
            const seconds = Math.floor((distance % (1000 * 60)) / 1000);

            document.getElementById("days").innerText = days < 10 ? "0" + days : days;
            document.getElementById("hours").innerText = hours < 10 ? "0" + hours : hours;
            document.getElementById("minutes").innerText = minutes < 10 ? "0" + minutes : minutes;
            document.getElementById("seconds").innerText = seconds < 10 ? "0" + seconds : seconds;
        }, 1000);

        // --- SİHİRLİ IŞILTILAR (Ateş Böcekleri) ÜRETİCİSİ ---
        const particlesContainer = document.getElementById('particles');
        const particleCount = 40;

        for (let i = 0; i < particleCount; i++) {
            let particle = document.createElement('div');
            particle.classList.add('particle');
            
            // Rastgele boyut (2px - 8px)
            let size = Math.random() * 6 + 2;
            particle.style.width = size + 'px';
            particle.style.height = size + 'px';
            
            // Rastgele yatay konum (%0 - %100)
            particle.style.left = Math.random() * 100 + 'vw';
            
            // Rastgele animasyon süresi (10s - 25s) ve gecikme
            let duration = Math.random() * 15 + 10;
            let delay = Math.random() * 10;
            particle.style.animationDuration = duration + 's';
            particle.style.animationDelay = delay + 's';
            
            particlesContainer.appendChild(particle);
        }
    </script>
</body>
</html>
